{% extends 'base.html' %}
{% block title %}輸入密碼 — 資料交換中心{% endblock %}
{% block content %}
<div class="password-container">
  <div class="password-card">
    <div class="lock-icon">🔒</div>
    <h2>此資料夾受密碼保護</h2>
    <p class="file-name-label">{{ folder.name }}</p>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('files.unlock_folder', folder_id=folder.id) }}">
      <div class="form-group">
        <input type="password" name="password" placeholder="輸入密碼" required autofocus class="password-input">
      </div>
      <button type="submit" class="btn-primary btn-full">確認</button>
    </form>
    <a href="javascript:history.back()" class="btn-link">返回</a>
  </div>
</div>
{% endblock %}
