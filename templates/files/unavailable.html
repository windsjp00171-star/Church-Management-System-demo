{% extends "base.html" %}
{% block title %}檔案分享 — {{ church_name }}{% endblock %}
{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:40px 24px;">
    <div style="font-size:3.5rem; margin-bottom:14px;">☁️</div>
    <h1 style="font-size:1.3rem; font-weight:700; color:var(--color-text); margin:0 0 8px;">檔案分享功能尚未啟用</h1>
    <p style="color:var(--color-text-light); font-size:0.88rem; margin:0 0 10px; max-width:360px; line-height:1.7;">
        此功能需要設定 Cloudflare R2 雲端儲存。<br>
        請管理員至部署精靈確認 R2 環境變數設定。
    </p>
    {% if session.get('is_admin') %}
    <a href="/setup-wizard" style="margin-top:14px; padding:9px 22px; background:var(--color-primary); color:#fff; border-radius:8px; text-decoration:none; font-size:0.88rem; font-weight:600;">
        前往部署精靈
    </a>
    {% endif %}
    <a href="/" style="margin-top:12px; color:var(--color-text-muted); font-size:0.82rem; text-decoration:none;">← 返回首頁</a>
</div>
{% endblock %}
