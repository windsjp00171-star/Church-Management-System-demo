{% extends "base.html" %}
{% block title %}繳費說明 - {{ event.title }}{% endblock %}
{% block content %}
<div style="max-width:520px; margin:0 auto; padding:24px 16px;">
    <div class="card" style="padding:28px; text-align:center;">
        <div style="font-size:3rem; margin-bottom:12px;">💳</div>
        <h2 style="margin-bottom:6px; color:#333;">{{ event.title }}</h2>
        <p style="color:#888; margin-bottom:24px;">活動費用：<strong style="color:#e53935; font-size:1.2rem;">NT$ {{ fee }}</strong></p>
        <div style="background:#f9f9f9; border-radius:10px; padding:20px; text-align:left; white-space:pre-wrap; line-height:1.9; color:#555; font-size:0.9rem; border:1px solid #eee;">{{ instructions }}</div>
        <a href="/events/{{ event.id }}" class="btn btn-primary" style="display:inline-block; margin-top:24px; text-decoration:none;">
            ← 返回活動頁面
        </a>
    </div>
</div>
{% endblock %}
