{% extends "base.html" %}
{% block title %}回報完成{% endblock %}
{% block content %}
<div class="container" style="max-width:500px; margin:60px auto; padding:0 16px; text-align:center;">
  <div style="font-size:3rem; margin-bottom:16px;">✅</div>
  <h1 style="font-size:1.5rem; font-weight:700; margin-bottom:8px;">回報完成！</h1>
  <p style="color:#666; margin-bottom:8px;">
    <strong>{{ group.name }}</strong> 的週報（{{ week_date }}）已成功送出。
  </p>
  {% if is_backfill %}
    <p style="color:#888; font-size:0.9rem; margin-bottom:24px;">（補登模式）</p>
  {% endif %}

  <div style="display:flex; flex-direction:column; gap:12px; max-width:300px; margin:32px auto 0;">
    <a href="{{ url_for('cell_report.section1', group_id=group.id) }}"
       style="display:block; padding:12px; background:#06C755; color:#fff; border-radius:10px;
              text-decoration:none; font-weight:600;">
      再次回報此小組
    </a>
    <a href="{{ url_for('cell_report.portal') }}"
       style="display:block; padding:12px; background:#f5f5f5; color:#333; border-radius:10px;
              text-decoration:none; font-weight:600;">
      返回小組列表
    </a>
  </div>
</div>
{% endblock %}
