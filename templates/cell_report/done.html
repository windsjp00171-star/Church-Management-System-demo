{% extends "base.html" %}
{% block title %}回報完成{% endblock %}
{% block content %}
<div class="container" style="max-width:500px; margin:40px auto 60px; padding:0 16px;">

  <div class="card" style="border-radius:16px; padding:28px 24px; animation:fadeInUp .3s ease;">

    <div style="text-align:center; padding: 16px 0 8px;">

      <!-- Success checkmark with animation -->
      <div id="success-icon"
           style="width:72px;height:72px;background:linear-gradient(135deg,#22c55e,#16a34a);
                  border-radius:50%;display:flex;align-items:center;justify-content:center;
                  margin:0 auto 20px;box-shadow:0 8px 24px rgba(34,197,94,.35);
                  transform:scale(0);transition:transform .45s cubic-bezier(.175,.885,.32,1.275);">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h2 style="font-size:1.4rem;font-weight:800;color:var(--color-primary);margin:0 0 8px;">週報已完成！</h2>
      <p style="color:var(--color-text-muted);font-size:.9rem;margin:0 0 8px;">
        感謝您的回報，牧者已可查閱本週小組狀況。
      </p>
      {% if is_backfill %}
        <p style="color:var(--color-text-muted);font-size:.82rem;margin:0 0 24px;">（補登模式）</p>
      {% else %}
        <p style="margin-bottom:28px;"></p>
      {% endif %}
    </div>

    <!-- Summary card -->
    <div style="background:var(--color-bg); border-radius:12px; padding:16px 18px; margin-bottom:24px;">
      <p style="font-size:.78rem;font-weight:700;color:var(--color-text-muted);text-transform:uppercase;
                letter-spacing:.07em;margin:0 0 12px;">本週回報摘要</p>
      <div class="info-row">
        <span class="info-row-label">小組</span>
        <span class="info-row-value" style="font-weight:600;color:var(--color-text);">{{ group.name }}</span>
      </div>
      <div class="info-row">
        <span class="info-row-label">聚會日期</span>
        <span class="info-row-value" style="font-weight:600;color:var(--color-text);">{{ week_date }}</span>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <a href="{{ url_for('cell_report.portal') }}"
         class="btn btn-primary"
         style="width:100%;padding:14px;font-size:1rem;border-radius:12px;text-decoration:none;display:flex;justify-content:center;">
        返回首頁
      </a>
      <a href="{{ url_for('cell_report.section1', group_id=group.id) }}"
         class="btn btn-secondary"
         style="width:100%;padding:12px;font-size:.9rem;border-radius:12px;text-decoration:none;display:flex;justify-content:center;">
        再次回報此小組
      </a>
    </div>

  </div>
</div>

<script>
// Entrance animation for the checkmark icon
window.addEventListener('load', function () {
  var icon = document.getElementById('success-icon');
  if (icon) {
    requestAnimationFrame(function () {
      setTimeout(function () {
        icon.style.transform = 'scale(1)';
      }, 80);
    });
  }
});
</script>
{% endblock %}
