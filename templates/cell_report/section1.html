{% extends "base.html" %}
{% block title %}小組回報 - 步驟一{% endblock %}
{% block content %}
<div class="container" style="max-width:600px; margin:32px auto 60px; padding:0 16px;">

  <!-- Back link -->
  <div style="margin-bottom:16px;">
    <a href="{{ url_for('cell_report.portal') }}"
       style="display:inline-flex; align-items:center; gap:4px; color:var(--color-text-muted); font-size:.85rem; text-decoration:none; transition:color var(--transition);"
       onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color='var(--color-text-muted)'">
      ← 返回小組選擇
    </a>
  </div>

  <!-- Card wrapper -->
  <div class="card" style="border-radius:16px; padding:28px 24px; animation:fadeInUp .3s ease;">

    <!-- Step progress header -->
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
      <span style="background:var(--color-primary);color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;">1</span>
      <div>
        <p style="font-weight:700;color:var(--color-primary);margin:0;font-size:.95rem;">聚會基本資訊</p>
        <p style="color:var(--color-text-muted);font-size:.75rem;margin:0;">步驟 1／3</p>
      </div>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <div style="width:24px;height:4px;border-radius:2px;background:var(--color-primary);"></div>
        <div style="width:24px;height:4px;border-radius:2px;background:var(--color-border);"></div>
        <div style="width:24px;height:4px;border-radius:2px;background:var(--color-border);"></div>
      </div>
    </div>

    <!-- Group name -->
    <div style="margin-bottom:20px;">
      <span class="section-label-sm">小組</span>
      <p style="font-size:1.15rem; font-weight:700; color:var(--color-primary); margin:4px 0 0;">{{ group.name }}</p>
    </div>

    <hr class="divider">

    {% if is_backfill %}
      <div class="callout callout-warning" style="margin-bottom:20px;">
        <span>⚠</span>
        <span>補登模式：正在填寫非本週聚會的回報。</span>
      </div>
    {% endif %}

    <form method="post">
      <!-- 聚會日期 -->
      <div class="form-group">
        <label class="form-label form-label-required">聚會日期</label>
        <input type="date" name="week_date" class="form-control"
               value="{{ (report.week_date if report and report.week_date else this_week.isoformat()) }}"
               style="padding:11px 13px; font-size:.95rem; border-radius:10px;">
      </div>

      <!-- 本週無聚會 -->
      <div class="form-group">
        <label style="display:flex; align-items:center; gap:10px; cursor:pointer; padding:12px 14px; border:1.5px solid var(--color-border); border-radius:10px; background:var(--color-bg); transition:border-color var(--transition);"
               onmouseover="this.style.borderColor='var(--color-primary)'" onmouseout="this.style.borderColor='var(--color-border)'">
          <input type="checkbox" name="no_meeting" id="no_meeting"
                 {% if report and report.get('no_meeting') %}checked{% endif %}
                 onchange="toggleNoMeeting(this.checked)"
                 style="width:18px; height:18px; accent-color:var(--color-primary); cursor:pointer;">
          <div>
            <span style="font-weight:600; color:var(--color-text); font-size:.9rem;">本週無聚會</span>
            <p style="color:var(--color-text-muted); font-size:.78rem; margin:1px 0 0;">勾選後可填寫原因，出席紀錄將略過</p>
          </div>
        </label>
      </div>

      <!-- 無聚會原因 -->
      <div id="no_meeting_reason_block" class="form-group"
           style="display:{% if report and report.get('no_meeting') %}block{% else %}none{% endif %};">
        <label class="form-label">無聚會原因</label>
        <input type="text" name="no_meeting_reason" class="form-control"
               value="{{ (report.no_meeting_reason if report else '') or '' }}"
               placeholder="例：颱風假、國定假日..."
               style="padding:11px 13px; font-size:.95rem; border-radius:10px;">
      </div>

      <!-- 出席人數 -->
      <div id="attendance_block" class="form-group"
           style="display:{% if report and report.get('no_meeting') %}none{% else %}block{% endif %};">
        <label class="form-label">出席人數（含組長）</label>
        <input type="number" name="attendance_count" min="0" class="form-control"
               value="{{ (report.attendance_count if report and report.get('attendance_count') is not none else '') }}"
               placeholder="0"
               style="padding:11px 13px; font-size:.95rem; border-radius:10px;">
        <p class="form-hint">請填寫本次小組聚會實際出席人數</p>
      </div>

      <hr class="divider">

      <button type="submit" class="btn btn-primary"
              style="width:100%; padding:14px; font-size:1rem; border-radius:12px; margin-top:4px; font-weight:700;">
        下一步：填寫出席紀錄 →
      </button>
    </form>
  </div>
</div>

<script>
function toggleNoMeeting(checked) {
  document.getElementById('no_meeting_reason_block').style.display = checked ? 'block' : 'none';
  document.getElementById('attendance_block').style.display = checked ? 'none' : 'block';
}
</script>
{% endblock %}
